<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chart.js</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body style="background-color: black;">
    
    <div>
  <canvas id="myChart"></canvas>
  <canvas id="myChart2"></canvas>
  <canvas id="myChart3"></canvas>
  <canvas id="myChart4"></canvas>
</div>
</body>
<script>
    const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
      datasets: [{
        label: 'umidade',
        data: [80, 82, 80, 85, 80, 83],
        fill: true,
    borderColor: '#590016',
    tension: 0.1
      }]
    },
  });
  const cx = document.getElementById('myChart2');

  new Chart(cx, {
    type: 'line',
    data: {
      labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
      datasets: [{
        label: 'temperatura',
        data: [30, 29, 28, 25, 22, 23],
        fill: false,
    borderColor: '#60DD2A',
    tension: 0.1
      }]
    },
  });
  const c = document.getElementById('myChart3');

  new Chart(c, {
    type: 'bar',
    data: {
      labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
      datasets: [{
        label: 'umidade',
        data: [90, 89, 93, 87, 88, 82],
        backgroundColor:['rgba(255, 196, 46, 1)',],
        borderWidth: 1
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
  const ct = document.getElementById('myChart4');

  new Chart(ct, {
    type: 'bar',
    data: {
      labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
      datasets: [{
        label: 'temperatura',
        data: [22, 24, 27, 23, 20, 18],
        backgroundColor:['rgba(90, 34, 139, 1)',],
        borderWidth: 1
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
  

</script>
 
</html>
